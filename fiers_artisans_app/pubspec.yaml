name: fiers_artisans_app
description: "Fiers Artisans — Marketplace mobile connectant artisans ivoiriens et clients."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Internationalization
  easy_localization: ^3.0.7
  intl: any

  # HTTP & Network
  dio: ^5.7.0
  web_socket_channel: ^3.0.2
  socket_io_client: ^3.0.2
  connectivity_plus: ^6.1.4

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  # UI & Design
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.3.1

  # Location
  geolocator: ^13.0.4
  geocoding: ^3.0.0

  # Firebase (notifications)
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.6

  # Pagination
  infinite_scroll_pagination: ^4.1.0

  # Image handling
  image_picker: ^1.1.2
  image_cropper: ^8.0.2

  # Utilities
  url_launcher: ^6.3.1
  permission_handler: ^11.4.0
  flutter_animate: ^4.5.2
  flutter_dotenv: ^6.0.0
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.4
  build_runner: ^2.4.14
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.4

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/translations/
    - assets/images/
    - assets/icons/
    - assets/animations/
