# ══════════════════════════════════════════════════════════════════════
# Fiers Artisans — Docker Compose
# ══════════════════════════════════════════════════════════════════════
# IMPORTANT : Toujours lancer avec --env-file depuis la racine du projet :
#   cd infrastructure
#   docker compose --env-file ../.env -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# Ou depuis la racine :
#   docker compose --env-file .env -f infrastructure/docker-compose.yml -f infrastructure/docker-compose.dev.yml up -d
# ══════════════════════════════════════════════════════════════════════

services:

  # ── Backend API NestJS ─────────────────────────────────────────────
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: fiers-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    env_file:
      - ../.env
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      # Overrides pour Docker — les services sont accessibles via leur nom de service
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
    networks:
      - fiers-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/v1/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── PostgreSQL 16 + PostGIS ────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: fiers-postgres
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fiers_artisans}
      POSTGRES_USER: ${POSTGRES_USER:-fiers_artisans}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD est requis — vérifiez votre .env}
    ports:
      - "5434:5432"
    networks:
      - fiers-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-fiers_artisans} -d $${POSTGRES_DB:-fiers_artisans}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB 7 ──────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: fiers-mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
      - ./mongodb/init.js:/docker-entrypoint-initdb.d/init.js
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-fiers_artisans}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD est requis — vérifiez votre .env}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-fiers_artisans}
    ports:
      - "27018:27017"
    networks:
      - fiers-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "-u", "${MONGO_USER:-fiers_artisans}", "-p", "${MONGO_PASSWORD}", "--authenticationDatabase", "admin", "--quiet"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Redis 7 ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fiers-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD est requis — vérifiez votre .env}
    command: ["sh", "-c", "redis-server --requirepass \"$REDIS_PASSWORD\" --appendonly yes"]
    ports:
      - "6380:6379"
    networks:
      - fiers-network
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a \"$REDIS_PASSWORD\" ping 2>/dev/null | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible) — Réseau interne uniquement en prod ──────
  minio:
    image: minio/minio
    container_name: fiers-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY est requis — vérifiez votre .env}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY est requis — vérifiez votre .env}
    networks:
      - fiers-network
    # Pas de ports exposés en production — accès uniquement via le réseau Docker interne
    # Utiliser docker-compose.dev.yml pour exposer les ports en développement local

  # ── Nginx — Reverse Proxy ──────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: fiers-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - fiers-network

  # ── Prometheus — Monitoring ────────────────────────────────────────
  prometheus:
    image: prom/prometheus
    container_name: fiers-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - fiers-network

  # ── Grafana — Dashboards ───────────────────────────────────────────
  grafana:
    image: grafana/grafana
    container_name: fiers-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - fiers-network

networks:
  fiers-network:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
