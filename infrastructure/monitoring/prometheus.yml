# ══════════════════════════════════════════════════════════════════════
# Fiers Artisans — Prometheus Configuration
# ══════════════════════════════════════════════════════════════════════

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'fiers-api'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['api:3000']
        labels:
          service: 'fiers-artisans-api'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
