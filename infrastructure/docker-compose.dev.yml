# Fiers Artisans - Override Developpement Local
# Usage depuis infrastructure/ :
#   docker compose --env-file ../.env -f docker-compose.yml -f docker-compose.dev.yml up -d
# Ne JAMAIS utiliser en production

services:
  api:
    build:
      target: development
    volumes:
      - ../backend/src:/app/src
    environment:
      - NODE_ENV=development
    command: npm run start:dev
    deploy:
      resources:
        limits:
          memory: 2G
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  minio:
    ports:
      - "9002:9000"
      - "9003:9001"

  # Desactiver Nginx en dev (acces direct a l'API sur le port 3000)
  nginx:
    profiles:
      - prod-only
